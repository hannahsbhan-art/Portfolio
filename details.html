<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAN SHINBI | Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- [초보자용 주석] 상세 페이지 헤더 -->
  <header class="header">
    <div class="logo">HAN SHINBI</div>
    <nav class="nav open">
      <a href="./index.html#projects">PROJECTS</a>
      <a href="./index.html#essay">ESSAY</a>
      <a href="./index.html">HOME</a>
    </nav>
  </header>

  <main style="padding:140px 24px 80px; max-width:980px; margin:0 auto;">
    <span class="section-number">DETAIL</span>
    <h1 id="detailTitle" style="font-family:'Cormorant Garamond', serif; font-size:clamp(38px,5vw,68px); margin-bottom:8px;">상세 페이지</h1>
    <p id="detailMeta" style="color:#8b2a2a; margin-bottom:26px;">Meta</p>
    <p id="detailBody" style="line-height:2; color:#d0d0d0; margin-bottom:28px;">
      내용 로딩 중...
    </p>

    <h2 style="font-size:26px; margin-bottom:12px;">핵심 포인트</h2>
    <ul id="detailBullets" style="color:#c6c6c6; line-height:1.9; padding-left:18px;">
      <li>내용 로딩 중...</li>
    </ul>

    <!-- [초보자용 주석] 아래 구역은 추후 자유롭게 추가해서 확장 -->
    <!--
    <section>
      <h3>추가 섹션 제목</h3>
      <p>여기에 활동, 프로젝트, 수상 등을 더 넣을 수 있습니다.</p>
    </section>
    -->

    <div style="margin-top:32px;">
      <a class="detail-link" href="./index.html">메인으로 돌아가기</a>
    </div>
  </main>

  <script>
    // [초보자용 주석] URL 파라미터에 따라 상세 텍스트를 바꿉니다.
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || "essay";

    const detailData = {
      intern: {
        title: "전략/기획 인턴십 상세",
        meta: "2024",
        body: "인턴십 기간 동안 조사-정리-실행의 전 과정을 경험했습니다. 자료를 빠르게 구조화해 보고서로 전환하는 역량, 유관 부서와 일정/요건을 조율하는 협업 역량을 강화했습니다.",
        bullets: [
          "시장/정책 자료 리서치 및 요약",
          "문서 초안 작성과 피드백 반영",
          "실행 단계 커뮤니케이션 지원"
        ]
      },
      shanghai: {
        title: "상해 교환학생 상세",
        meta: "2024",
        body: "상해 교환학생 경험을 통해 언어 능력뿐 아니라 다문화 협업 방식, 생활 적응력, 글로벌 시각을 키웠습니다. 수업과 팀 과제를 통해 실제 소통과 문제 해결 역량을 높였습니다.",
        bullets: [
          "중국 현지 학업/프로젝트 참여",
          "다국적 팀 협업 경험",
          "언어·문화 기반 문제해결 역량 강화"
        ]
      },
      ngo: {
        title: "NGO · 인권 활동 상세",
        meta: "2023 ~ Present",
        body: "인권 관련 활동에서 현장 운영 보조, 참여자 안내, 자료 제작과 정리 업무를 맡았습니다. 작게 시작해도 누군가의 권리 회복에 실질적으로 기여하는 경험을 쌓았습니다.",
        bullets: [
          "캠페인/행사 운영 지원",
          "자료 정리 및 커뮤니케이션",
          "인권 이슈 전달 콘텐츠 보조"
        ]
      },
      essay: {
        title: "자기소개서 상세",
        meta: "자서전(신비 자서전) 기반 요약",
        body: "저는 북한 양강도 혜산에서 태어나 자유와 인권의 부재를 체감하며 성장했습니다. 이 경험은 인간의 존엄과 권리를 가장 먼저 고려하는 저의 가치관을 만들었습니다. 현재는 중국어문학과 공법학을 공부하며 인턴십, 상해 교환학생, NGO·인권 활동으로 사회적 문제를 현장에서 이해하고 해결하는 역량을 키워가고 있습니다.",
        bullets: [
          "핵심 가치: 자유·인권·존엄",
          "학업 기반: 중국어문학 + 공법학",
          "실행 경험: 인턴십, 교환학생, NGO 활동"
        ]
      }
    };

    const selected = detailData[type] || detailData.essay;
    document.getElementById("detailTitle").textContent = selected.title;
    document.getElementById("detailMeta").textContent = selected.meta;
    document.getElementById("detailBody").textContent = selected.body;
    document.getElementById("detailBullets").innerHTML = selected.bullets.map((item) => `<li>${item}</li>`).join("");
  </script>
</body>
</html>
